<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A premium futuristic information registration interface with a secure identity dashboard preview."
    />
    <title>Aureon ID | Create Your Identity</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas id="constellation" aria-hidden="true"></canvas>
    <div class="atmosphere" aria-hidden="true">
      <span class="glow glow-a"></span>
      <span class="glow glow-b"></span>
      <span class="glow glow-c"></span>
      <span class="grain"></span>
    </div>

    <main class="page-shell">
      <section class="experience-grid" aria-label="Identity registration">
        <form class="registration-card" id="registrationForm">
          <div class="card-chrome" aria-hidden="true"></div>

          <header class="card-header">
            <div class="topbar">
              <a class="brand" href="#" aria-label="Aureon ID home">
                <span class="brand-mark">
                  <span></span>
                  <span></span>
                  <span></span>
                </span>
                <span>Aureon ID</span>
              </a>

              <div class="header-actions">
                <button
                  class="icon-button"
                  type="button"
                  id="themeToggle"
                  aria-label="Toggle light mode"
                  data-tooltip="Dark/light"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 3v2.4" />
                    <path d="M12 18.6V21" />
                    <path d="m4.8 4.8 1.7 1.7" />
                    <path d="m17.5 17.5 1.7 1.7" />
                    <path d="M3 12h2.4" />
                    <path d="M18.6 12H21" />
                    <path d="m4.8 19.2 1.7-1.7" />
                    <path d="m17.5 6.5 1.7-1.7" />
                    <circle cx="12" cy="12" r="3.6" />
                  </svg>
                </button>
                <button
                  class="icon-button"
                  type="button"
                  aria-label="Use Face ID"
                  data-tooltip="Face ID"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M7 3H5a2 2 0 0 0-2 2v2" />
                    <path d="M17 3h2a2 2 0 0 1 2 2v2" />
                    <path d="M21 17v2a2 2 0 0 1-2 2h-2" />
                    <path d="M7 21H5a2 2 0 0 1-2-2v-2" />
                    <path d="M8.5 9.5v.01" />
                    <path d="M15.5 9.5v.01" />
                    <path d="M9 15c1.6 1.3 4.4 1.3 6 0" />
                  </svg>
                </button>
              </div>
            </div>

            <p class="eyebrow">Private identity vault</p>
            <h1>Create Your Identity</h1>
            <p class="subtitle">Securely store and manage your information.</p>
          </header>

          <div class="signin-row" aria-label="Alternative sign in options">
            <button class="social-button" type="button">
              <span class="google-mark" aria-hidden="true">G</span>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A premium futuristic information registration experience with a secure identity dashboard preview."
    />
    <title>Aureon ID | Create Your Identity</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas id="constellation" aria-hidden="true"></canvas>
    <div class="ambient ambient-one" aria-hidden="true"></div>
    <div class="ambient ambient-two" aria-hidden="true"></div>
    <div class="ambient ambient-three" aria-hidden="true"></div>

    <main class="page-shell">
      <section class="registration-card" aria-labelledby="identity-title">
        <div class="card-shine" aria-hidden="true"></div>

        <header class="card-header">
          <div class="brand-row">
            <a class="brand" href="#" aria-label="Aureon ID home">
              <span class="brand-mark" aria-hidden="true">
                <span></span>
              </span>
              <span>Aureon ID</span>
            </a>

            <div class="card-actions">
              <button
                class="icon-button"
                type="button"
                aria-label="Use Face ID"
                data-soft-action="face-id"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M8 4H6.5A2.5 2.5 0 0 0 4 6.5V8" />
                  <path d="M16 4h1.5A2.5 2.5 0 0 1 20 6.5V8" />
                  <path d="M8 20H6.5A2.5 2.5 0 0 1 4 17.5V16" />
                  <path d="M16 20h1.5A2.5 2.5 0 0 0 20 17.5V16" />
                  <path d="M9 9h.01" />
                  <path d="M15 9h.01" />
                  <path d="M9.5 15.5c1.6 1 3.4 1 5 0" />
                  <path d="M12 9v3l-1 1" />
                </svg>
              </button>
              <button
                class="icon-button"
                type="button"
                aria-label="Toggle light mode"
                data-theme-toggle
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 3v2" />
                  <path d="M12 19v2" />
                  <path d="m4.22 4.22 1.42 1.42" />
                  <path d="m18.36 18.36 1.42 1.42" />
                  <path d="M3 12h2" />
                  <path d="M19 12h2" />
                  <path d="m4.22 19.78 1.42-1.42" />
                  <path d="m18.36 5.64 1.42-1.42" />
                  <circle cx="12" cy="12" r="4" />
                </svg>
              </button>
            </div>
          </div>

          <p class="eyebrow">Private identity vault</p>
          <h1 id="identity-title">Create Your Identity</h1>
          <p class="subtitle">Securely store and manage your information.</p>
        </header>

        <div class="signin-grid" aria-label="Alternative sign in options">
          <button class="social-button" type="button" data-soft-action="google">
            <span class="google-mark" aria-hidden="true">G</span>
            <span>Continue with Google</span>
          </button>
          <button class="social-button social-button-icon" type="button" data-soft-action="face-id">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 4H6.5A2.5 2.5 0 0 0 4 6.5V8" />
              <path d="M16 4h1.5A2.5 2.5 0 0 1 20 6.5V8" />
